<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <title>Simples Pomodoro</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Simples Pomodoro</h1>

        <div class="div-fundo">
            <div class="circulo">
                <span id="timer">temporizador</span>
            </div>

            <div class="fundo-botoes">
                <button type="button" id="iniciar">Iniciar</button>

                <button type="button" id="parar">Parar</button>

                <button type="button" id="resetar">Resetar</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
